<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RSA Encrypted Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Courier New', monospace;
      background: #0d0d0d;
      color: #d4d4d4;
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 14px;
      gap: 10px;
      overflow: hidden;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .back {
      font-size: 0.62rem;
      color: #333;
      text-decoration: none;
      letter-spacing: 0.08em;
      transition: color 0.15s;
    }
    .back:hover { color: #555; }

    h1 {
      font-size: 0.8rem;
      color: #555;
      letter-spacing: 0.05em;
      font-weight: normal;
    }

    .panel {
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      padding: 10px 12px;
      flex-shrink: 0;
    }

    .panel label {
      display: block;
      font-size: 0.65rem;
      color: #555;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .row { display: flex; gap: 8px; align-items: flex-start; }

    textarea {
      flex: 1;
      background: #0d0d0d;
      color: #7ec8e3;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      padding: 7px 9px;
      font-family: inherit;
      font-size: 0.68rem;
      resize: none;
      line-height: 1.4;
    }
    textarea:focus { outline: none; border-color: #3a5a3a; }
    textarea[readonly] { color: #5b9bd5; cursor: default; }

    button {
      background: #1c1c1c;
      color: #bbb;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 6px 14px;
      font-family: inherit;
      font-size: 0.78rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s;
    }
    button:hover:not(:disabled) { background: #252525; color: #e0e0e0; }
    button:disabled { opacity: 0.35; cursor: default; }
    button.primary {
      background: #132213;
      border-color: #2a4a2a;
      color: #6fcf6f;
    }
    button.primary:hover:not(:disabled) { background: #1a2e1a; }

    .hint {
      font-size: 0.68rem;
      margin-top: 6px;
    }
    .hint.ok    { color: #4caf50; }
    .hint.err   { color: #ef5350; }
    .hint.muted { color: #555; }

    #messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 4px 0;
      min-height: 0;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

    .msg {
      padding: 7px 11px;
      border-radius: 5px;
      font-size: 0.85rem;
      max-width: 75%;
      word-break: break-word;
      line-height: 1.45;
    }
    .msg.sent     { background: #0f2a0f; border: 1px solid #1e4a1e; align-self: flex-end; color: #b8e6b8; }
    .msg.received { background: #0f1a2a; border: 1px solid #1e3a5a; align-self: flex-start; color: #b8d4e6; }
    .msg.system   { background: transparent; align-self: center; font-size: 0.7rem; color: #444; font-style: italic; }

    #sendBar {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    #msgInput {
      flex: 1;
      background: #141414;
      color: #d4d4d4;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      padding: 8px 11px;
      font-family: inherit;
      font-size: 0.9rem;
    }
    #msgInput:focus { outline: none; border-color: #3a5a3a; }
    #msgInput:disabled { opacity: 0.35; }
  </style>
</head>
<body>

  <div class="topbar">
    <a href="/" class="back">← rsa-chat</a>
    <h1>RSA ENCRYPTED CHAT &nbsp;·&nbsp; zero storage &nbsp;·&nbsp; fully anonymous</h1>
  </div>

  <div class="panel">
    <label>Your public key &nbsp;—&nbsp; share this with the person you want to chat with</label>
    <div class="row">
      <textarea id="myKey" rows="3" readonly placeholder="generating RSA-2048 key pair…"></textarea>
      <button id="copyBtn" onclick="copyMyKey()">copy</button>
    </div>
  </div>

  <div class="panel">
    <label>Recipient's public key &nbsp;—&nbsp; paste what they shared with you</label>
    <div class="row">
      <textarea id="recipientKey" rows="3" placeholder="paste their public key here…"></textarea>
      <button id="setBtn" onclick="setRecipient()">set</button>
    </div>
    <div id="recipientHint" class="hint muted"></div>
  </div>

  <div id="messages"></div>

  <div id="sendBar">
    <input id="msgInput" type="text" placeholder="type a message… (Enter to send)" disabled />
    <button class="primary" id="sendBtn" onclick="sendMessage()" disabled>send</button>
  </div>

<script>
let keyPair            = null;
let myPublicKeyB64     = null;
let recipientCryptoKey = null;
let recipientKeyB64    = null;
let firstMessageSent   = false;
let ws                 = null;

function ab2b64(buf) {
  return btoa(String.fromCharCode(...new Uint8Array(buf)));
}
function b642ab(b64) {
  return Uint8Array.from(atob(b64), c => c.charCodeAt(0)).buffer;
}

async function init() {
  keyPair = await crypto.subtle.generateKey(
    { name: "RSA-OAEP", modulusLength: 2048, publicExponent: new Uint8Array([1, 0, 1]), hash: "SHA-256" },
    true,
    ["encrypt", "decrypt"]
  );

  const spki = await crypto.subtle.exportKey("spki", keyPair.publicKey);
  myPublicKeyB64 = ab2b64(spki);
  document.getElementById("myKey").value = myPublicKeyB64;

  const proto = location.protocol === "https:" ? "wss:" : "ws:";
  ws = new WebSocket(`${proto}//${location.host}/ws`);

  ws.onopen = () => {
    ws.send(JSON.stringify({ type: "register", publicKey: myPublicKeyB64 }));
    addSystem("connected — your keys are ready. share your public key to start a conversation.");
  };

  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    if (msg.type === "message") handleIncoming(msg);
    else if (msg.type === "error") addSystem("⚠ " + msg.message);
  };

  ws.onclose = () => {
    addSystem("disconnected — all keys destroyed.");
    document.getElementById("msgInput").disabled = true;
    document.getElementById("sendBtn").disabled = true;
  };
}

async function setRecipient(keyB64Override) {
  const raw = (keyB64Override ?? document.getElementById("recipientKey").value).trim();
  if (!raw) return;

  try {
    recipientCryptoKey = await crypto.subtle.importKey(
      "spki", b642ab(raw),
      { name: "RSA-OAEP", hash: "SHA-256" },
      true, ["encrypt"]
    );
    recipientKeyB64 = raw;
    firstMessageSent = false;

    if (!keyB64Override) document.getElementById("recipientKey").value = raw;

    setHint("recipientHint", "recipient key loaded — messages are end-to-end encrypted", "ok");
    document.getElementById("msgInput").disabled = false;
    document.getElementById("sendBtn").disabled = false;
    document.getElementById("msgInput").focus();
  } catch {
    setHint("recipientHint", "invalid key — make sure you pasted it completely", "err");
  }
}

async function encryptPayload(plaintext) {
  const aesKey = await crypto.subtle.generateKey({ name: "AES-GCM", length: 256 }, true, ["encrypt"]);
  const iv     = crypto.getRandomValues(new Uint8Array(12));

  const encryptedMsg = await crypto.subtle.encrypt(
    { name: "AES-GCM", iv }, aesKey,
    new TextEncoder().encode(plaintext)
  );
  const rawAes       = await crypto.subtle.exportKey("raw", aesKey);
  const encryptedKey = await crypto.subtle.encrypt({ name: "RSA-OAEP" }, recipientCryptoKey, rawAes);

  return { k: ab2b64(encryptedKey), iv: ab2b64(iv), msg: ab2b64(encryptedMsg) };
}

async function decryptPayload(payload) {
  const rawAes = await crypto.subtle.decrypt(
    { name: "RSA-OAEP" }, keyPair.privateKey, b642ab(payload.k)
  );
  const aesKey = await crypto.subtle.importKey("raw", rawAes, { name: "AES-GCM" }, false, ["decrypt"]);
  const plain  = await crypto.subtle.decrypt(
    { name: "AES-GCM", iv: new Uint8Array(b642ab(payload.iv)) }, aesKey, b642ab(payload.msg)
  );
  return new TextDecoder().decode(plain);
}

async function sendMessage() {
  const input = document.getElementById("msgInput");
  const text  = input.value.trim();
  if (!text || !recipientCryptoKey || !ws || ws.readyState !== WebSocket.OPEN) return;

  const payload = await encryptPayload(text);
  ws.send(JSON.stringify({
    type: "message",
    to: recipientKeyB64,
    payload,
    senderKey: firstMessageSent ? undefined : myPublicKeyB64,
  }));

  firstMessageSent = true;
  addMessage(text, "sent");
  input.value = "";
}

async function handleIncoming(msg) {
  if (msg.senderKey && !recipientCryptoKey) {
    await setRecipient(msg.senderKey);
    addSystem("recipient key auto-loaded from incoming message — you can reply now.");
  }
  try {
    const plaintext = await decryptPayload(msg.payload);
    addMessage(plaintext, "received");
  } catch {
    addSystem("⚠ could not decrypt a message — keys may not match.");
  }
}

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = `msg ${type}`;
  div.textContent = text;
  const box = document.getElementById("messages");
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}
function addSystem(text) { addMessage(text, "system"); }
function setHint(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = `hint ${type}`;
}
async function copyMyKey() {
  await navigator.clipboard.writeText(myPublicKeyB64);
  const btn = document.getElementById("copyBtn");
  btn.textContent = "copied!";
  setTimeout(() => (btn.textContent = "copy"), 1800);
}

document.getElementById("msgInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) sendMessage();
});

init();
</script>
</body>
</html>
