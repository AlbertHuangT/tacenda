<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tacenda</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Courier New', monospace;
      background: #0d0d0d;
      color: #d4d4d4;
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 14px;
      gap: 10px;
      overflow: hidden;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .back {
      font-size: 0.62rem;
      color: #333;
      text-decoration: none;
      letter-spacing: 0.08em;
      transition: color 0.15s;
    }
    .back:hover { color: #555; }

    h1 {
      font-size: 0.8rem;
      color: #555;
      letter-spacing: 0.05em;
      font-weight: normal;
    }

    .panel {
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      padding: 10px 12px;
      flex-shrink: 0;
    }

    .panel label {
      display: block;
      font-size: 0.65rem;
      color: #555;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .row { display: flex; gap: 8px; align-items: flex-start; }

    textarea {
      flex: 1;
      background: #0d0d0d;
      color: #7ec8e3;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      padding: 7px 9px;
      font-family: inherit;
      font-size: 0.68rem;
      resize: none;
      line-height: 1.4;
    }
    textarea:focus { outline: none; border-color: #3a5a3a; }
    textarea[readonly] { color: #5b9bd5; cursor: default; }

    button {
      background: #1c1c1c;
      color: #bbb;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 6px 14px;
      font-family: inherit;
      font-size: 0.78rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s;
    }
    button:hover:not(:disabled) { background: #252525; color: #e0e0e0; }
    button:disabled { opacity: 0.35; cursor: default; }
    button.primary {
      background: #132213;
      border-color: #2a4a2a;
      color: #6fcf6f;
    }
    button.primary:hover:not(:disabled) { background: #1a2e1a; }

    .hint {
      font-size: 0.68rem;
      margin-top: 6px;
    }
    .hint.ok    { color: #4caf50; }
    .hint.err   { color: #ef5350; }
    .hint.muted { color: #555; }

    #messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 4px 0;
      min-height: 0;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

    .msg {
      padding: 7px 11px;
      border-radius: 5px;
      font-size: 0.85rem;
      max-width: 75%;
      word-break: break-word;
      line-height: 1.45;
    }
    .msg.sent     { background: #0f2a0f; border: 1px solid #1e4a1e; align-self: flex-end; color: #b8e6b8; }
    .msg.received { background: #0f1a2a; border: 1px solid #1e3a5a; align-self: flex-start; color: #b8d4e6; }
    .msg.system   { background: transparent; align-self: center; font-size: 0.7rem; color: #444; font-style: italic; }

    #sendBar {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    #msgInput {
      flex: 1;
      background: #141414;
      color: #d4d4d4;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      padding: 8px 11px;
      font-family: inherit;
      font-size: 0.9rem;
    }
    #msgInput:focus { outline: none; border-color: #3a5a3a; }
    #msgInput:disabled { opacity: 0.35; }
  </style>
</head>
<body>

  <div class="topbar">
    <a href="/" class="back">← Tacenda</a>
    <h1>TACENDA &nbsp;·&nbsp; zero storage &nbsp;·&nbsp; fully anonymous</h1>
  </div>

  <div class="panel">
    <label>Your public key &nbsp;—&nbsp; share this with the person you want to chat with</label>
    <div class="row">
      <textarea id="myKey" rows="3" readonly placeholder="generating X25519 key pair…"></textarea>
      <button id="copyBtn" onclick="copyMyKey()">copy</button>
    </div>
  </div>

  <div class="panel">
    <label>Recipient's public key &nbsp;—&nbsp; paste what they shared with you</label>
    <div class="row">
      <textarea id="recipientKey" rows="3" placeholder="paste their public key here…"></textarea>
      <button id="setBtn" onclick="setRecipient()">set</button>
    </div>
    <div id="recipientHint" class="hint muted"></div>
  </div>

  <div id="messages"></div>

  <div id="sendBar">
    <input id="msgInput" type="text" placeholder="type a message… (Enter to send)" disabled />
    <button class="primary" id="sendBtn" onclick="sendMessage()" disabled>send</button>
  </div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
let mySessionKeyPair  = null;     // X25519 keypair { privateKey, publicKey }
let mySessionPubRaw   = null;     // Uint8Array(32)
let mySessionPubB64   = null;
let recipientPubRaw   = null;     // Uint8Array(32)
let recipientPubB64   = null;
let ratchet           = null;     // active Double Ratchet state
let iInitiated       = false;     // true if user pasted peer's pub (we sent init handshake)
let ws                = null;

// ─── Base64 helpers ───────────────────────────────────────────────────────────
function ab2b64(buf) {
  return btoa(String.fromCharCode(...new Uint8Array(buf)));
}
function b642u8(b64) {
  return Uint8Array.from(atob(b64), c => c.charCodeAt(0));
}
function concatU8(...parts) {
  const total = parts.reduce((n, p) => n + p.length, 0);
  const out = new Uint8Array(total);
  let off = 0;
  for (const p of parts) { out.set(p, off); off += p.length; }
  return out;
}
function eqU8(a, b) {
  if (a.length !== b.length) return false;
  let d = 0;
  for (let i = 0; i < a.length; i++) d |= a[i] ^ b[i];
  return d === 0;
}
function cmpU8(a, b) {
  for (let i = 0; i < Math.min(a.length, b.length); i++) {
    if (a[i] !== b[i]) return a[i] - b[i];
  }
  return a.length - b.length;
}

// ─── Crypto primitives ────────────────────────────────────────────────────────
async function genX25519() {
  const kp = await crypto.subtle.generateKey({ name: "X25519" }, true, ["deriveBits"]);
  const pubRaw = new Uint8Array(await crypto.subtle.exportKey("raw", kp.publicKey));
  return { keyPair: kp, pubRaw };
}

async function importX25519Pub(rawU8) {
  return await crypto.subtle.importKey("raw", rawU8, { name: "X25519" }, true, []);
}

async function dh(privateKey, peerPubRaw) {
  const peerPub = await importX25519Pub(peerPubRaw);
  return new Uint8Array(await crypto.subtle.deriveBits(
    { name: "X25519", public: peerPub }, privateKey, 256
  ));
}

async function hkdf(ikm, salt, infoStr, lenBytes) {
  const baseKey = await crypto.subtle.importKey("raw", ikm, "HKDF", false, ["deriveBits"]);
  return new Uint8Array(await crypto.subtle.deriveBits(
    { name: "HKDF", hash: "SHA-256", salt, info: new TextEncoder().encode(infoStr) },
    baseKey, lenBytes * 8
  ));
}

async function hmac(key32, dataU8) {
  const k = await crypto.subtle.importKey("raw", key32, { name: "HMAC", hash: "SHA-256" }, false, ["sign"]);
  return new Uint8Array(await crypto.subtle.sign("HMAC", k, dataU8));
}

async function aesGcmEnc(key32, iv12, ptU8, aadU8) {
  const k = await crypto.subtle.importKey("raw", key32, { name: "AES-GCM" }, false, ["encrypt"]);
  return new Uint8Array(await crypto.subtle.encrypt(
    { name: "AES-GCM", iv: iv12, additionalData: aadU8 ?? new Uint8Array(0) }, k, ptU8
  ));
}

async function aesGcmDec(key32, iv12, ctU8, aadU8) {
  const k = await crypto.subtle.importKey("raw", key32, { name: "AES-GCM" }, false, ["decrypt"]);
  return new Uint8Array(await crypto.subtle.decrypt(
    { name: "AES-GCM", iv: iv12, additionalData: aadU8 ?? new Uint8Array(0) }, k, ctU8
  ));
}

// ─── Double Ratchet (Signal spec, simplified) ─────────────────────────────────
// Naming follows the spec: RK = root key, CKs/CKr = sending/receiving chain key,
// DHs = my current DH keypair, DHr = peer's last DH pubkey, Ns/Nr = chain indices,
// PN = previous-chain length (for skipped-message handling, kept minimal here).
//
// Bootstrap: rk_0 = HKDF(DH(my_session_priv, peer_session_pub), "Tacenda/init/v1")
// First sender immediately rotates DHs to a fresh ephemeral and advances rk.

const RK_INFO = "Tacenda/rk/v1";
const MK_INFO = "Tacenda/mk-mac/v1";
const INIT_INFO = "Tacenda/init/v1";
const HS_INFO = "Tacenda/handshake/v1";

// ─── ECIES sealed-box for handshakes ──────────────────────────────────────────
// Encrypt a 33-byte plaintext ([intent_byte, ...32B session_pub]) to a peer's
// X25519 public key. Anyone without the matching private key gets a decryption
// failure and silently drops the message.
async function ecesEncrypt(recipientPubRaw, plaintextU8) {
  const eph = await genX25519();
  const shared = await dh(eph.keyPair.privateKey, recipientPubRaw);
  const key = await hkdf(shared, new Uint8Array(32), HS_INFO, 32);
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await aesGcmEnc(key, iv, plaintextU8);
  return { eph: ab2b64(eph.pubRaw), iv: ab2b64(iv), ct: ab2b64(ct) };
}
async function ecesDecrypt(myPrivKey, payload) {
  const ephPub = b642u8(payload.eph);
  const shared = await dh(myPrivKey, ephPub);
  const key = await hkdf(shared, new Uint8Array(32), HS_INFO, 32);
  return await aesGcmDec(key, b642u8(payload.iv), b642u8(payload.ct));
}

async function ratchetInit({ amInitiator, mySessionKP, mySessionPubRaw, peerPubRaw }) {
  const shared = await dh(mySessionKP.privateKey, peerPubRaw);
  const rk0 = await hkdf(shared, new Uint8Array(32), INIT_INFO, 32);

  const state = {
    DHs: mySessionKP,
    DHs_pub: mySessionPubRaw,
    DHr: peerPubRaw,
    RK: rk0,
    CKs: null,
    CKr: null,
    Ns: 0,
    Nr: 0,
    PN: 0,
    burnedMACs: [],   // [{seq, macKey}] — reserved for Phase 4
  };

  if (amInitiator) {
    // Rotate: generate a fresh DHs immediately so first message starts a new chain
    const fresh = await genX25519();
    state.DHs = fresh.keyPair;
    state.DHs_pub = fresh.pubRaw;
    const dhOut = await dh(state.DHs.privateKey, state.DHr);
    const out = await hkdf(dhOut, state.RK, RK_INFO, 64);
    state.RK = out.slice(0, 32);
    state.CKs = out.slice(32, 64);
  }
  return state;
}

async function advanceCK(ck) {
  // mk_seed = HMAC(ck, 0x01); next_ck = HMAC(ck, 0x02)
  const mkSeed = await hmac(ck, new Uint8Array([0x01]));
  const nextCK = await hmac(ck, new Uint8Array([0x02]));
  const out = await hkdf(mkSeed, new Uint8Array(32), MK_INFO, 64);
  return { nextCK, mk: out.slice(0, 32), macKey: out.slice(32, 64) };
}

async function dhRatchetSending(state) {
  // Used when we receive a new DHr OR when bootstrapping responder's send side.
  const dhOut = await dh(state.DHs.privateKey, state.DHr);
  const out = await hkdf(dhOut, state.RK, RK_INFO, 64);
  state.RK = out.slice(0, 32);
  state.CKs = out.slice(32, 64);
  state.PN = state.Ns;
  state.Ns = 0;
}

async function dhRatchetReceiving(state, newDHrRaw) {
  state.DHr = newDHrRaw;
  const dhOut = await dh(state.DHs.privateKey, state.DHr);
  const out = await hkdf(dhOut, state.RK, RK_INFO, 64);
  state.RK = out.slice(0, 32);
  state.CKr = out.slice(32, 64);
  state.Nr = 0;
  // Generate fresh DHs for our next send and prep CKs
  const fresh = await genX25519();
  state.DHs = fresh.keyPair;
  state.DHs_pub = fresh.pubRaw;
  await dhRatchetSending(state);
}

async function ratchetEncrypt(state, plaintextU8) {
  if (!state.CKs) throw new Error("no sending chain (responder must wait for first message)");
  const { nextCK, mk, macKey } = await advanceCK(state.CKs);
  state.CKs = nextCK;
  const seq = state.Ns;
  state.Ns += 1;
  state.burnedMACs.push({ seq, macKey });

  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await aesGcmEnc(mk, iv, plaintextU8);

  // Header authenticated by HMAC (separate from AEAD tag — its key is the burnable mac_key)
  const header = {
    dh: ab2b64(state.DHs_pub),
    pn: state.PN,
    n:  seq,
    iv: ab2b64(iv),
    ct: ab2b64(ct),
  };
  const headerBytes = new TextEncoder().encode(JSON.stringify(header));
  const mac = await hmac(macKey, headerBytes);
  header.mac = ab2b64(mac);
  return header;
}

async function ratchetDecrypt(state, header) {
  const incomingDHrRaw = b642u8(header.dh);
  const dhChanged = !state.DHr || !eqU8(incomingDHrRaw, state.DHr);
  if (dhChanged) {
    await dhRatchetReceiving(state, incomingDHrRaw);
  }
  if (!state.CKr) throw new Error("no receiving chain");

  // Advance CKr until we reach header.n. We only support in-order delivery in
  // Phase 1; skipped-message keys are not retained. (Future: bounded skip cache.)
  let mk, macKey;
  while (state.Nr <= header.n) {
    const step = await advanceCK(state.CKr);
    state.CKr = step.nextCK;
    mk = step.mk;
    macKey = step.macKey;
    state.Nr += 1;
    if (state.Nr - 1 === header.n) break;
  }
  if (state.Nr - 1 !== header.n) throw new Error("ratchet desync");

  // Verify HMAC over header-without-mac
  const headerCopy = { dh: header.dh, pn: header.pn, n: header.n, iv: header.iv, ct: header.ct };
  const headerBytes = new TextEncoder().encode(JSON.stringify(headerCopy));
  const expected = await hmac(macKey, headerBytes);
  if (!eqU8(expected, b642u8(header.mac))) throw new Error("mac mismatch");

  const iv = b642u8(header.iv);
  const ct = b642u8(header.ct);
  const pt = await aesGcmDec(mk, iv, ct);
  return pt;
}

// ─── App init ─────────────────────────────────────────────────────────────────
async function init() {
  const session = await genX25519();
  mySessionKeyPair = session.keyPair;
  mySessionPubRaw  = session.pubRaw;
  mySessionPubB64  = ab2b64(mySessionPubRaw);
  document.getElementById("myKey").value = mySessionPubB64;

  const proto = location.protocol === "https:" ? "wss:" : "ws:";
  ws = new WebSocket(`${proto}//${location.host}/ws`);

  ws.onopen = () => {
    addSystem("connected — share your public key to start a conversation.");
  };

  ws.onmessage = (event) => {
    let msg;
    try { msg = JSON.parse(event.data); } catch { return; }
    if (msg.type === "handshake_broadcast") handleHandshake(msg);
    else if (msg.type === "message") handleMessage(msg);
  };

  ws.onerror = () => addSystem("⚠ connection error — check your network.");

  ws.onclose = () => {
    addSystem("disconnected — all keys destroyed.");
    document.getElementById("msgInput").disabled = true;
    document.getElementById("sendBtn").disabled = true;
  };
}

// User pasted recipient's pubkey → send init handshake. Ratchet is set up only
// once we receive the peer's reply handshake (or an init from them, if they're
// also initiating).
async function setRecipient(keyB64Override) {
  const raw = (keyB64Override ?? document.getElementById("recipientKey").value).trim();
  if (!raw) return;

  let pubRaw;
  try {
    pubRaw = b642u8(raw);
    if (pubRaw.length !== 32) throw 0;
    await importX25519Pub(pubRaw);
  } catch {
    setHint("recipientHint", "invalid key — must be a 32-byte X25519 pubkey (base64)", "err");
    return;
  }

  recipientPubRaw = pubRaw;
  recipientPubB64 = raw;
  iInitiated = true;
  ratchet = null;

  // Init handshake plaintext = [0x00, my_session_pub (32B)]
  const plaintext = concatU8(new Uint8Array([0x00]), mySessionPubRaw);
  const payload = await ecesEncrypt(pubRaw, plaintext);
  ws.send(JSON.stringify({ type: "handshake_broadcast", payload }));

  if (!keyB64Override) document.getElementById("recipientKey").value = raw;
  setHint("recipientHint", "handshake sent — waiting for recipient to come online", "muted");
  document.getElementById("msgInput").disabled = true;
  document.getElementById("sendBtn").disabled = true;
}

async function handleHandshake(msg) {
  let plaintext;
  try { plaintext = await ecesDecrypt(mySessionKeyPair.privateKey, msg.payload); }
  catch { return; } // not for us
  if (plaintext.length !== 33) return;

  const intent = plaintext[0];
  const senderSessionPub = plaintext.slice(1, 33);
  if (ratchet) return; // already in a conversation

  if (intent === 0x00) {
    // Peer is initiating chat with us. Send reply, then bootstrap.
    const reply = concatU8(new Uint8Array([0x01]), mySessionPubRaw);
    const replyPayload = await ecesEncrypt(senderSessionPub, reply);
    ws.send(JSON.stringify({ type: "handshake_broadcast", payload: replyPayload }));

    // Simultaneous-initiation tie-break: if we also initiated, the side with
    // greater pubkey becomes initiator (so one side has CKs ready).
    const amInitiator = iInitiated && cmpU8(mySessionPubRaw, senderSessionPub) > 0;

    recipientPubRaw = senderSessionPub;
    recipientPubB64 = ab2b64(senderSessionPub);
    document.getElementById("recipientKey").value = recipientPubB64;
    ratchet = await ratchetInit({
      amInitiator, mySessionKP: mySessionKeyPair, mySessionPubRaw,
      peerPubRaw: senderSessionPub,
    });
  } else if (intent === 0x01) {
    // We initiated; peer is replying with their session_pub.
    if (!iInitiated) return;
    recipientPubRaw = senderSessionPub;
    recipientPubB64 = ab2b64(senderSessionPub);
    document.getElementById("recipientKey").value = recipientPubB64;
    ratchet = await ratchetInit({
      amInitiator: true, mySessionKP: mySessionKeyPair, mySessionPubRaw,
      peerPubRaw: senderSessionPub,
    });
  } else {
    return;
  }

  document.getElementById("msgInput").disabled = false;
  document.getElementById("sendBtn").disabled = false;
  setHint("recipientHint", "handshake complete — chat is forward-secret end-to-end", "ok");
}

async function handleMessage(msg) {
  if (!ratchet) return; // no conversation set up; silently drop broadcast traffic
  try {
    const pt = await ratchetDecrypt(ratchet, msg.payload);
    addMessage(new TextDecoder().decode(pt), "received");
  } catch {
    // Not for us, or ratchet desync — drop silently. This is the normal case
    // for the majority of broadcast traffic once everyone is on one channel.
  }
}

async function sendMessage() {
  const input = document.getElementById("msgInput");
  const text  = input.value.trim();
  if (!text || !ratchet || !ws || ws.readyState !== WebSocket.OPEN) return;
  const payload = await ratchetEncrypt(ratchet, new TextEncoder().encode(text));
  ws.send(JSON.stringify({ type: "message", payload }));
  addMessage(text, "sent");
  input.value = "";
}

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = `msg ${type}`;
  div.textContent = text;
  const box = document.getElementById("messages");
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}
function addSystem(text) { addMessage(text, "system"); }
function setHint(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = `hint ${type}`;
}
async function copyMyKey() {
  await navigator.clipboard.writeText(mySessionPubB64);
  const btn = document.getElementById("copyBtn");
  btn.textContent = "copied!";
  setTimeout(() => (btn.textContent = "copy"), 1800);
}

document.getElementById("msgInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) sendMessage();
});

init();
</script>
</body>
</html>
