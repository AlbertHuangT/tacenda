<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tacenda</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Courier New', monospace;
      background: #0d0d0d;
      color: #d4d4d4;
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 14px;
      gap: 10px;
      overflow: hidden;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .back {
      font-size: 0.62rem;
      color: #333;
      text-decoration: none;
      letter-spacing: 0.08em;
      transition: color 0.15s;
    }
    .back:hover { color: #555; }

    h1 {
      font-size: 0.8rem;
      color: #555;
      letter-spacing: 0.05em;
      font-weight: normal;
    }

    .panel {
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      padding: 10px 12px;
      flex-shrink: 0;
    }

    .panel label {
      display: block;
      font-size: 0.65rem;
      color: #555;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .row { display: flex; gap: 8px; align-items: flex-start; }

    textarea {
      flex: 1;
      background: #0d0d0d;
      color: #7ec8e3;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      padding: 7px 9px;
      font-family: inherit;
      font-size: 0.68rem;
      resize: none;
      line-height: 1.4;
    }
    textarea:focus { outline: none; border-color: #3a5a3a; }
    textarea[readonly] { color: #5b9bd5; cursor: default; }

    button {
      background: #1c1c1c;
      color: #bbb;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 6px 14px;
      font-family: inherit;
      font-size: 0.78rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s;
    }
    button:hover:not(:disabled) { background: #252525; color: #e0e0e0; }
    button:disabled { opacity: 0.35; cursor: default; }
    button.primary {
      background: #132213;
      border-color: #2a4a2a;
      color: #6fcf6f;
    }
    button.primary:hover:not(:disabled) { background: #1a2e1a; }

    .hint {
      font-size: 0.68rem;
      margin-top: 6px;
    }
    .hint.ok    { color: #4caf50; }
    .hint.err   { color: #ef5350; }
    .hint.muted { color: #555; }

    #messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 4px 0;
      min-height: 0;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

    .msg {
      padding: 7px 11px;
      border-radius: 5px;
      font-size: 0.85rem;
      max-width: 75%;
      word-break: break-word;
      line-height: 1.45;
    }
    .msg.sent     { background: #0f2a0f; border: 1px solid #1e4a1e; align-self: flex-end; color: #b8e6b8; }
    .msg.received { background: #0f1a2a; border: 1px solid #1e3a5a; align-self: flex-start; color: #b8d4e6; }
    .msg.system   { background: transparent; align-self: center; font-size: 0.7rem; color: #444; font-style: italic; }

    #sendBar {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    #msgInput {
      flex: 1;
      background: #141414;
      color: #d4d4d4;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      padding: 8px 11px;
      font-family: inherit;
      font-size: 0.9rem;
    }
    #msgInput:focus { outline: none; border-color: #3a5a3a; }
    #msgInput:disabled { opacity: 0.35; }
  </style>
</head>
<body>

  <div class="topbar">
    <a href="/" class="back">← Tacenda</a>
    <h1>TACENDA &nbsp;·&nbsp; zero storage &nbsp;·&nbsp; fully anonymous</h1>
  </div>

  <div class="panel">
    <label>Your public key &nbsp;—&nbsp; share this with the person you want to chat with</label>
    <div class="row">
      <textarea id="myKey" rows="3" readonly placeholder="generating X25519 key pair…"></textarea>
      <button id="copyBtn" onclick="copyMyKey()">copy</button>
    </div>
  </div>

  <div class="panel">
    <label>Recipient's public key &nbsp;—&nbsp; paste what they shared with you</label>
    <div class="row">
      <textarea id="recipientKey" rows="3" placeholder="paste their public key here…"></textarea>
      <button id="setBtn" onclick="setRecipient()">set</button>
    </div>
    <div id="recipientHint" class="hint muted"></div>
  </div>

  <div id="messages"></div>

  <div id="sendBar">
    <input id="msgInput" type="text" placeholder="type a message… (Enter to send)" disabled />
    <button class="primary" id="sendBtn" onclick="sendMessage()" disabled>send</button>
  </div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
let mySessionKeyPair  = null;     // X25519 keypair { privateKey, publicKey }
let mySessionPubRaw   = null;     // Uint8Array(32)
let mySessionPubB64   = null;
let recipientPubRaw   = null;     // Uint8Array(32)
let recipientPubB64   = null;
let ratchet           = null;     // active Double Ratchet state
let iInitiated       = false;     // true if user pasted peer's pub (we sent init handshake)
let ws                = null;

// ─── Base64 helpers ───────────────────────────────────────────────────────────
function ab2b64(buf) {
  return btoa(String.fromCharCode(...new Uint8Array(buf)));
}
function b642u8(b64) {
  return Uint8Array.from(atob(b64), c => c.charCodeAt(0));
}
function concatU8(...parts) {
  const total = parts.reduce((n, p) => n + p.length, 0);
  const out = new Uint8Array(total);
  let off = 0;
  for (const p of parts) { out.set(p, off); off += p.length; }
  return out;
}
function eqU8(a, b) {
  if (a.length !== b.length) return false;
  let d = 0;
  for (let i = 0; i < a.length; i++) d |= a[i] ^ b[i];
  return d === 0;
}
function cmpU8(a, b) {
  for (let i = 0; i < Math.min(a.length, b.length); i++) {
    if (a[i] !== b[i]) return a[i] - b[i];
  }
  return a.length - b.length;
}

// ─── Crypto primitives ────────────────────────────────────────────────────────
async function genX25519() {
  const kp = await crypto.subtle.generateKey({ name: "X25519" }, true, ["deriveBits"]);
  const pubRaw = new Uint8Array(await crypto.subtle.exportKey("raw", kp.publicKey));
  return { keyPair: kp, pubRaw };
}

async function importX25519Pub(rawU8) {
  return await crypto.subtle.importKey("raw", rawU8, { name: "X25519" }, true, []);
}

async function dh(privateKey, peerPubRaw) {
  const peerPub = await importX25519Pub(peerPubRaw);
  return new Uint8Array(await crypto.subtle.deriveBits(
    { name: "X25519", public: peerPub }, privateKey, 256
  ));
}

async function hkdf(ikm, salt, infoStr, lenBytes) {
  const baseKey = await crypto.subtle.importKey("raw", ikm, "HKDF", false, ["deriveBits"]);
  return new Uint8Array(await crypto.subtle.deriveBits(
    { name: "HKDF", hash: "SHA-256", salt, info: new TextEncoder().encode(infoStr) },
    baseKey, lenBytes * 8
  ));
}

async function hmac(key32, dataU8) {
  const k = await crypto.subtle.importKey("raw", key32, { name: "HMAC", hash: "SHA-256" }, false, ["sign"]);
  return new Uint8Array(await crypto.subtle.sign("HMAC", k, dataU8));
}

async function aesGcmEnc(key32, iv12, ptU8, aadU8) {
  const k = await crypto.subtle.importKey("raw", key32, { name: "AES-GCM" }, false, ["encrypt"]);
  return new Uint8Array(await crypto.subtle.encrypt(
    { name: "AES-GCM", iv: iv12, additionalData: aadU8 ?? new Uint8Array(0) }, k, ptU8
  ));
}

async function aesGcmDec(key32, iv12, ctU8, aadU8) {
  const k = await crypto.subtle.importKey("raw", key32, { name: "AES-GCM" }, false, ["decrypt"]);
  return new Uint8Array(await crypto.subtle.decrypt(
    { name: "AES-GCM", iv: iv12, additionalData: aadU8 ?? new Uint8Array(0) }, k, ctU8
  ));
}

// ─── Double Ratchet (Signal spec, simplified) ─────────────────────────────────
// Naming follows the spec: RK = root key, CKs/CKr = sending/receiving chain key,
// DHs = my current DH keypair, DHr = peer's last DH pubkey, Ns/Nr = chain indices,
// PN = previous-chain length (for skipped-message handling, kept minimal here).
//
// Bootstrap: rk_0 = HKDF(DH(my_session_priv, peer_session_pub), "Tacenda/init/v1")
// First sender immediately rotates DHs to a fresh ephemeral and advances rk.

const RK_INFO = "Tacenda/rk/v1";
const MK_INFO = "Tacenda/mk-mac/v1";
const INIT_INFO = "Tacenda/init/v1";
const HS_INFO = "Tacenda/handshake/v1";

// ─── Slot format (Phase 3) ────────────────────────────────────────────────────
// Fixed 1024-byte binary blob on the wire. Every client emits one slot every
// SLOT_INTERVAL_MS, with either a real ciphertext or pure random noise. Real
// and noise are indistinguishable to the server and to network observers.
//
// Layout:
//   [0..32]    pub   — X25519 32B (ratchet DH pub OR ECIES ephemeral pub)
//   [32..44]   iv    — AES-GCM 12B nonce
//   [44..76]   mac   — HMAC-SHA256 (ratchet); random bytes (handshake / noise)
//   [76..1024] ct    — AES-GCM(plaintext_932B) → 932 + 16B tag = 948B
//
// Plaintext (932 bytes after AES-GCM auth):
//   [0..2]    msg_len  uint16 BE (0..922)
//   [2..6]    pn       uint32 BE (ratchet only, else 0)
//   [6..10]   n        uint32 BE (ratchet only, else 0)
//   [10..10+msg_len] msg
//   [10+msg_len..932] random padding

const SLOT_SIZE = 1024;
const SLOT_PUB_OFFSET = 0;
const SLOT_IV_OFFSET = 32;
const SLOT_MAC_OFFSET = 44;
const SLOT_CT_OFFSET = 76;
const SLOT_CT_SIZE = SLOT_SIZE - SLOT_CT_OFFSET; // 948
const SLOT_PT_SIZE = SLOT_CT_SIZE - 16;          // 932 (AES-GCM tag is 16B)
const SLOT_META_SIZE = 10;                        // 2 + 4 + 4
const MAX_MSG_LEN = SLOT_PT_SIZE - SLOT_META_SIZE; // 922
const SLOT_INTERVAL_MS = 2000;

// Pack arbitrary message bytes (length ≤ 922) into a 932-byte plaintext block,
// padded with random bytes so that ciphertext length is always 948.
function packPlaintext(msgU8, pn, n) {
  if (msgU8.length > MAX_MSG_LEN) throw new Error("message too long for one slot");
  const pt = crypto.getRandomValues(new Uint8Array(SLOT_PT_SIZE));
  const dv = new DataView(pt.buffer);
  dv.setUint16(0, msgU8.length, false);
  dv.setUint32(2, pn >>> 0, false);
  dv.setUint32(6, n  >>> 0, false);
  pt.set(msgU8, SLOT_META_SIZE);
  // bytes after SLOT_META_SIZE + msgU8.length stay random (already filled above)
  return pt;
}

function unpackPlaintext(ptU8) {
  if (ptU8.length !== SLOT_PT_SIZE) throw new Error("bad plaintext size");
  const dv = new DataView(ptU8.buffer, ptU8.byteOffset, ptU8.byteLength);
  const msgLen = dv.getUint16(0, false);
  if (msgLen > MAX_MSG_LEN) throw new Error("declared msg_len exceeds budget");
  const pn = dv.getUint32(2, false);
  const n  = dv.getUint32(6, false);
  const msg = ptU8.subarray(SLOT_META_SIZE, SLOT_META_SIZE + msgLen);
  return { msg, pn, n };
}

async function ratchetInit({ amInitiator, mySessionKP, mySessionPubRaw, peerPubRaw }) {
  const shared = await dh(mySessionKP.privateKey, peerPubRaw);
  const rk0 = await hkdf(shared, new Uint8Array(32), INIT_INFO, 32);

  const state = {
    DHs: mySessionKP,
    DHs_pub: mySessionPubRaw,
    DHr: peerPubRaw,
    RK: rk0,
    CKs: null,
    CKr: null,
    Ns: 0,
    Nr: 0,
    PN: 0,
    burnedMACs: [],   // [{seq, macKey}] — reserved for Phase 4
  };

  if (amInitiator) {
    // Rotate: generate a fresh DHs immediately so first message starts a new chain
    const fresh = await genX25519();
    state.DHs = fresh.keyPair;
    state.DHs_pub = fresh.pubRaw;
    const dhOut = await dh(state.DHs.privateKey, state.DHr);
    const out = await hkdf(dhOut, state.RK, RK_INFO, 64);
    state.RK = out.slice(0, 32);
    state.CKs = out.slice(32, 64);
  }
  return state;
}

async function advanceCK(ck) {
  // mk_seed = HMAC(ck, 0x01); next_ck = HMAC(ck, 0x02)
  const mkSeed = await hmac(ck, new Uint8Array([0x01]));
  const nextCK = await hmac(ck, new Uint8Array([0x02]));
  const out = await hkdf(mkSeed, new Uint8Array(32), MK_INFO, 64);
  return { nextCK, mk: out.slice(0, 32), macKey: out.slice(32, 64) };
}

async function dhRatchetSending(state) {
  // Used when we receive a new DHr OR when bootstrapping responder's send side.
  const dhOut = await dh(state.DHs.privateKey, state.DHr);
  const out = await hkdf(dhOut, state.RK, RK_INFO, 64);
  state.RK = out.slice(0, 32);
  state.CKs = out.slice(32, 64);
  state.PN = state.Ns;
  state.Ns = 0;
}

async function dhRatchetReceiving(state, newDHrRaw) {
  state.DHr = newDHrRaw;
  const dhOut = await dh(state.DHs.privateKey, state.DHr);
  const out = await hkdf(dhOut, state.RK, RK_INFO, 64);
  state.RK = out.slice(0, 32);
  state.CKr = out.slice(32, 64);
  state.Nr = 0;
  // Generate fresh DHs for our next send and prep CKs
  const fresh = await genX25519();
  state.DHs = fresh.keyPair;
  state.DHs_pub = fresh.pubRaw;
  await dhRatchetSending(state);
}

// ─── Slot encoders ────────────────────────────────────────────────────────────
async function encodeRatchetSlot(state, msgU8) {
  if (!state.CKs) throw new Error("no sending chain (responder must wait for first message)");
  const step = await advanceCK(state.CKs);
  state.CKs = step.nextCK;
  const seq = state.Ns;
  state.Ns += 1;
  state.burnedMACs.push({ seq, macKey: step.macKey });

  const pt = packPlaintext(msgU8, state.PN, seq);
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await aesGcmEnc(step.mk, iv, pt);

  const slot = new Uint8Array(SLOT_SIZE);
  slot.set(state.DHs_pub, SLOT_PUB_OFFSET);
  slot.set(iv, SLOT_IV_OFFSET);
  slot.set(ct, SLOT_CT_OFFSET);

  // MAC over [pub || iv || ct]; the mac field itself is excluded
  const macInput = new Uint8Array(32 + 12 + SLOT_CT_SIZE);
  macInput.set(slot.subarray(SLOT_PUB_OFFSET, SLOT_PUB_OFFSET + 32), 0);
  macInput.set(slot.subarray(SLOT_IV_OFFSET,  SLOT_IV_OFFSET + 12), 32);
  macInput.set(slot.subarray(SLOT_CT_OFFSET,  SLOT_SIZE), 32 + 12);
  const mac = await hmac(step.macKey, macInput);
  slot.set(mac, SLOT_MAC_OFFSET);
  return slot;
}

async function encodeHandshakeSlot(recipientPubRaw, msgU8) {
  const eph = await genX25519();
  const shared = await dh(eph.keyPair.privateKey, recipientPubRaw);
  const key = await hkdf(shared, new Uint8Array(32), HS_INFO, 32);

  const pt = packPlaintext(msgU8, 0, 0);
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await aesGcmEnc(key, iv, pt);

  const slot = new Uint8Array(SLOT_SIZE);
  slot.set(eph.pubRaw, SLOT_PUB_OFFSET);
  slot.set(iv, SLOT_IV_OFFSET);
  // mac field is random — indistinguishable from a real ratchet MAC
  crypto.getRandomValues(slot.subarray(SLOT_MAC_OFFSET, SLOT_MAC_OFFSET + 32));
  slot.set(ct, SLOT_CT_OFFSET);
  return slot;
}

// ─── Trial-decrypt ────────────────────────────────────────────────────────────
// Caller tries ECIES against my privkey(s) first (handshake); then ratchet
// against the active ratchet (message). Each path leaves no state behind on
// failure.

async function tryEciesDecrypt(myPrivKey, slot) {
  const pub = slot.subarray(SLOT_PUB_OFFSET, SLOT_PUB_OFFSET + 32);
  const iv  = slot.subarray(SLOT_IV_OFFSET,  SLOT_IV_OFFSET + 12);
  const ct  = slot.subarray(SLOT_CT_OFFSET,  SLOT_SIZE);
  let pt;
  try {
    const shared = await dh(myPrivKey, pub);
    const key = await hkdf(shared, new Uint8Array(32), HS_INFO, 32);
    pt = await aesGcmDec(key, iv, ct);
  } catch { return null; }
  try { return unpackPlaintext(pt).msg; } catch { return null; }
}

async function tryRatchetDecrypt(state, slot) {
  const pub = slot.subarray(SLOT_PUB_OFFSET, SLOT_PUB_OFFSET + 32);
  const iv  = slot.subarray(SLOT_IV_OFFSET,  SLOT_IV_OFFSET + 12);
  const mac = slot.subarray(SLOT_MAC_OFFSET, SLOT_MAC_OFFSET + 32);
  const ct  = slot.subarray(SLOT_CT_OFFSET,  SLOT_SIZE);

  // Snapshot mutable fields so we can restore on any failure
  const saved = {
    DHs: state.DHs, DHs_pub: state.DHs_pub, DHr: state.DHr,
    RK: state.RK, CKs: state.CKs, CKr: state.CKr,
    Ns: state.Ns, Nr: state.Nr, PN: state.PN,
  };
  try {
    if (!state.DHr || !eqU8(pub, state.DHr)) {
      await dhRatchetReceiving(state, new Uint8Array(pub));
    }
    if (!state.CKr) throw 0;
    const step = await advanceCK(state.CKr);
    state.CKr = step.nextCK;
    state.Nr += 1;

    // Verify MAC before trusting plaintext
    const macInput = new Uint8Array(32 + 12 + SLOT_CT_SIZE);
    macInput.set(pub, 0);
    macInput.set(iv,  32);
    macInput.set(ct,  44);
    const expected = await hmac(step.macKey, macInput);
    if (!eqU8(expected, mac)) throw 0;

    const pt = await aesGcmDec(step.mk, iv, ct);
    return unpackPlaintext(pt).msg;
  } catch {
    Object.assign(state, saved);
    return null;
  }
}

// ─── Send queue + slot scheduler (Phase 3 anonymous broadcast room) ──────────
// Real messages and handshakes are queued; the scheduler emits one 1024-byte
// slot every SLOT_INTERVAL_MS regardless of whether anything is queued (random
// noise fills empty ticks). On the wire, real traffic and silence are
// cryptographically indistinguishable.

const sendQueue = []; // Array<Uint8Array(1024)>

async function tick() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  let slot;
  if (sendQueue.length > 0) {
    slot = sendQueue.shift();
  } else {
    slot = crypto.getRandomValues(new Uint8Array(SLOT_SIZE));
  }
  ws.send(slot);
}

// ─── App init ─────────────────────────────────────────────────────────────────
async function init() {
  const session = await genX25519();
  mySessionKeyPair = session.keyPair;
  mySessionPubRaw  = session.pubRaw;
  mySessionPubB64  = ab2b64(mySessionPubRaw);
  document.getElementById("myKey").value = mySessionPubB64;

  const proto = location.protocol === "https:" ? "wss:" : "ws:";
  ws = new WebSocket(`${proto}//${location.host}/ws`);
  ws.binaryType = "arraybuffer";

  ws.onopen = () => {
    addSystem("connected — share your public key to start a conversation.");
    addSystem(`broadcasting one ${SLOT_SIZE}-byte slot every ${SLOT_INTERVAL_MS / 1000}s (real ↔ noise indistinguishable).`);
    setInterval(tick, SLOT_INTERVAL_MS);
  };

  ws.onmessage = (event) => {
    if (!(event.data instanceof ArrayBuffer)) return;
    if (event.data.byteLength !== SLOT_SIZE) return;
    handleSlot(new Uint8Array(event.data));
  };

  ws.onerror = () => addSystem("⚠ connection error — check your network.");

  ws.onclose = () => {
    addSystem("disconnected — all keys destroyed.");
    document.getElementById("msgInput").disabled = true;
    document.getElementById("sendBtn").disabled = true;
  };
}

// User pasted recipient's pubkey → enqueue init handshake slot. Ratchet is
// set up only once we receive the peer's reply (or an init from them).
async function setRecipient(keyB64Override) {
  const raw = (keyB64Override ?? document.getElementById("recipientKey").value).trim();
  if (!raw) return;

  let pubRaw;
  try {
    pubRaw = b642u8(raw);
    if (pubRaw.length !== 32) throw 0;
    await importX25519Pub(pubRaw);
  } catch {
    setHint("recipientHint", "invalid key — must be a 32-byte X25519 pubkey (base64)", "err");
    return;
  }

  recipientPubRaw = pubRaw;
  recipientPubB64 = raw;
  iInitiated = true;
  ratchet = null;

  const plaintext = concatU8(new Uint8Array([0x00]), mySessionPubRaw); // init
  const slot = await encodeHandshakeSlot(pubRaw, plaintext);
  sendQueue.push(slot);

  if (!keyB64Override) document.getElementById("recipientKey").value = raw;
  setHint("recipientHint", "handshake queued — sends on next slot tick (up to 2s)", "muted");
  document.getElementById("msgInput").disabled = true;
  document.getElementById("sendBtn").disabled = true;
}

// Single slot handler: trial-decrypt as ECIES first (handshake?), then ratchet
// (message?). Failures are silent — most slots are noise or not for us.
async function handleSlot(slot) {
  // Handshake path
  const hsPt = await tryEciesDecrypt(mySessionKeyPair.privateKey, slot);
  if (hsPt && hsPt.length === 33) {
    await handleHandshakePlaintext(hsPt);
    return;
  }
  // Message path
  if (ratchet) {
    const msgBytes = await tryRatchetDecrypt(ratchet, slot);
    if (msgBytes) {
      addMessage(new TextDecoder().decode(msgBytes), "received");
      return;
    }
  }
  // Else: noise or not for us — drop silently
}

async function handleHandshakePlaintext(pt) {
  const intent = pt[0];
  const senderSessionPub = pt.slice(1, 33);
  if (ratchet) return;

  if (intent === 0x00) {
    // Peer is initiating with us. Reply, then bootstrap as responder (or as
    // initiator on tie-break when we also initiated and have greater pubkey).
    const reply = concatU8(new Uint8Array([0x01]), mySessionPubRaw);
    const replySlot = await encodeHandshakeSlot(senderSessionPub, reply);
    sendQueue.push(replySlot);

    const amInitiator = iInitiated && cmpU8(mySessionPubRaw, senderSessionPub) > 0;
    recipientPubRaw = senderSessionPub;
    recipientPubB64 = ab2b64(senderSessionPub);
    document.getElementById("recipientKey").value = recipientPubB64;
    ratchet = await ratchetInit({
      amInitiator, mySessionKP: mySessionKeyPair, mySessionPubRaw,
      peerPubRaw: senderSessionPub,
    });
  } else if (intent === 0x01) {
    if (!iInitiated) return;
    recipientPubRaw = senderSessionPub;
    recipientPubB64 = ab2b64(senderSessionPub);
    document.getElementById("recipientKey").value = recipientPubB64;
    ratchet = await ratchetInit({
      amInitiator: true, mySessionKP: mySessionKeyPair, mySessionPubRaw,
      peerPubRaw: senderSessionPub,
    });
  } else {
    return;
  }
  document.getElementById("msgInput").disabled = false;
  document.getElementById("sendBtn").disabled = false;
  setHint("recipientHint", "handshake complete — chat is forward-secret end-to-end", "ok");
}

async function sendMessage() {
  const input = document.getElementById("msgInput");
  const text  = input.value.trim();
  if (!text || !ratchet) return;
  const bytes = new TextEncoder().encode(text);
  if (bytes.length > MAX_MSG_LEN) {
    addSystem(`⚠ message too long (max ${MAX_MSG_LEN} bytes per slot — chunking not implemented).`);
    return;
  }
  const slot = await encodeRatchetSlot(ratchet, bytes);
  sendQueue.push(slot);
  addMessage(text, "sent");
  input.value = "";
}

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = `msg ${type}`;
  div.textContent = text;
  const box = document.getElementById("messages");
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}
function addSystem(text) { addMessage(text, "system"); }
function setHint(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = `hint ${type}`;
}
async function copyMyKey() {
  await navigator.clipboard.writeText(mySessionPubB64);
  const btn = document.getElementById("copyBtn");
  btn.textContent = "copied!";
  setTimeout(() => (btn.textContent = "copy"), 1800);
}

document.getElementById("msgInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) sendMessage();
});

init();
</script>
</body>
