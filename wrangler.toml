name = "rsa-chat"
main = "worker.js"
compatibility_date = "2024-11-01"

# Static frontend is served from ./public
# The ASSETS binding lets the Worker proxy to it for non-/ws paths
[assets]
directory = "./public"
binding = "ASSETS"

# ChatRoom Durable Object — holds the in-memory WebSocket routing table
[[durable_objects.bindings]]
name = "CHAT"
class_name = "ChatRoom"

[[migrations]]
tag = "v1"
new_classes = ["ChatRoom"]
